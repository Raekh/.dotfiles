# Terminal settings {{{
# set -g default-terminal "xterm-256color"
# set -ga terminal-overrides ",xterm-256color:T"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on
set -g visual-activity off
# }}}

# Action key {{{
set-option -g repeat-time 0
# }}}

# Key bindings {{{
set-window-option -g mode-keys vi

bind-key J command-prompt -p "join pane from:" "join-pane -s '%%'"
bind-key S command-prompt -p "send pane to:" "join-pane -t '%%'"
# }}}

# Settings {{{

# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind u attach-session -c "#{pane_current_path}" \; display "Updated tmux path!"
# Open current directory
bind o run-shell "open #{pane_current_path}"
bind -r e kill-pane -a
# }}}

# Window management {{{
# Start indexing windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Swap panes
bind-key C-s swap-pane -D  # Swap with next pane
bind-key C-S-s swap-pane -U  # Swap with previous pane

# Moving windows
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; previous-window

# Resizing pane
bind -r C-k resize-pane -U 25
bind -r C-j resize-pane -D 25
bind -r C-h resize-pane -L 25
bind -r C-l resize-pane -R 25

# }}}

# Basic settings {{{
set-option -g status-justify "left"

# Appearance
set-option -g history-limit 999999
set -sg escape-time 10
# }}}

# Import {{{
# if-shell "uname -r | grep -q microsoft" "source ~/.tmux/.tmux.wsl.conf"
# }}}

# Powerline {{{
# source ~/.tmux/.tmux.powerline.conf
# }}}

# Plugins {{{
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'tmux-plugins/tmux-web-reachable'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'aserowy/tmux.nvim'

# ═══════════════════════════════════════════════════════════════════════════════
# SAMARITAN — tmux-power theme overrides
# Monochromatic surveillance aesthetic. Red (sparingly), white, black, grays.
# ═══════════════════════════════════════════════════════════════════════════════

# Accent color — muted red, not full #ff0000 (too glaring for status bar)
set -g @tmux_power_theme '#cc0000'

# Dark gradient — matches neovim/ghostty/oh-my-posh Samaritan palette
set -g @tmux_power_g0 '#111114'
set -g @tmux_power_g1 '#1a1a1e'
set -g @tmux_power_g2 '#2a2a2e'
set -g @tmux_power_g3 '#3a3a3e'
set -g @tmux_power_g4 '#888888'

# Icons — Samaritan glyphs matching oh-my-posh prompt
set -g @tmux_power_session_icon        '▼'
set -g @tmux_power_user_icon           '◈'
set -g @tmux_power_time_icon           'FEED:'
set -g @tmux_power_date_icon           ''
set -g @tmux_power_right_arrow_icon    ''
set -g @tmux_power_left_arrow_icon     ''
set -g @tmux_power_upload_speed_icon   '▲'
set -g @tmux_power_download_speed_icon '▽'

# Segments
set -g @tmux_power_show_upload_speed   true
set -g @tmux_power_show_download_speed true
set -g @tmux_power_show_web_reachable  true
set -g @tmux_power_show_user           true
set -g @tmux_power_show_host           false
set -g @tmux_power_show_session        true
set -g @tmux_power_time_format         '%H:%M:%S'
set -g @tmux_power_date_format         '%Y-%m-%d'


set -g @plugin 'whame/tmux-modal'
set -g @modal_key T
set -g @modal_resize_keys 'h:left j:down k:up l:right'

run '~/.tmux/plugins/tpm/tpm'

