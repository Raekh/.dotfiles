# Sourcing external config files
env = WRL_DRM_NO_MODIFIERS,1

# Default Configs
$configs = $HOME/.config/hypr/configs

source=$configs/Settings.conf
source=$configs/Keybinds.conf

# User Configs
$UserConfigs = $HOME/.config/hypr/UserConfigs

source= $UserConfigs/Startup_Apps.conf
source= $UserConfigs/ENVariables.conf
# Monitor layout handled by local profile daemon (authoritative)
# source= $UserConfigs/Monitors.conf
source= $UserConfigs/Laptops.conf
# source= $UserConfigs/LaptopDisplay.conf
source= $UserConfigs/WindowRules.conf
source= $UserConfigs/UserKeybinds.conf
source= $UserConfigs/UserSettings.conf
source= $UserConfigs/WorkspaceRules.conf

env = MOZ_ENABLE_WAYLAND, 1
env = widget.wayland.fractional-scale, true

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Re-apply monitor profile on every hyprctl reload
exec = sh -lc '$HOME/.config/hypr/scripts/MonitorProfiles.sh --apply >/dev/null 2>&1'


misc {
  mouse_move_enables_dpms=true
  key_press_enables_dpms=true
  no_direct_scanout=true
}

xwayland {
  force_zero_scaling = true
}
