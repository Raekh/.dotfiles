# Samaritan Lock Screen
# Hyprlock

# Sourcing Samaritan color palette
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
}

background {
    monitor =
	path = screenshot
    color = $color0

    blur_size = 6
    blur_passes = 3
    noise = 0.0080
    contrast = 1.2000
    brightness = 0.6000
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.20
    dots_center = true
    dots_rounding = 0
    rounding = 0
    outer_color = rgb(ff0000)
    inner_color = $color0
    font_color = $color15
    fade_on_empty = true
    placeholder_text = <i>// AUTHENTICATE</i>
    hide_input = false
    check_color = $color5
    fail_color = rgb(ff0000)
    fail_text = <i>ACCESS DENIED <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgb(ff0000)

    position = 0, 200
    halign = center
    valign = bottom
}

# ── Corner grid marks ── + --- +
# Top-left
label {
    monitor =
    text = "+ --- +"
    color = $color4
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 30, -30
    halign = left
    valign = top
}

# Top-right
label {
    monitor =
    text = "+ --- +"
    color = $color4
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = -30, -30
    halign = right
    valign = top
}

# Bottom-left
label {
    monitor =
    text = "+ --- +"
    color = $color4
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 30, 30
    halign = left
    valign = bottom
}

# Bottom-right
label {
    monitor =
    text = "+ --- +"
    color = $color4
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}

# ── Samaritan status indicator ──
label {
    monitor =
    text = "▼  ACTIVE"
    color = rgb(ff0000)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 0, -30
    halign = center
    valign = top
}

# ── Date ──
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
    color = $color5
    font_size = 34
    font_family = JetBrains Mono Nerd Font 10

    position = 0, -150
    halign = center
    valign = top
}

# Week
label {
    monitor =
    text = cmd[update:18000000] date +"WEEK %U // DAY %j"
    color = $color4
    font_size = 24
    font_family = JetBrains Mono Nerd Font 10
    position = 0, -250
    halign = center
    valign = top
}

# ── Time ──
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = $color15
    font_size = 94
    font_family = JetBrains Mono Nerd Font 10

    position = 0, 0
    halign = center
    valign = center
}

# Samaritan glyph
label {
    monitor =
    text = "▼"
    color = rgb(ff0000)
    font_size = 28
    font_family = JetBrains Mono Nerd Font

    position = 0, -60
    halign = center
    valign = center
}

# ── User ──
label {
    monitor =
    text = "SUBJ:  $USER"
    color = $color5
    font_size = 18
    font_family = JetBrains Mono Nerd Font

    position = 0, 100
    halign = center
    valign = bottom
}

# ── Uptime ──
label {
    monitor =
    text = cmd[update:60000] echo "SYS.UPTIME: $(uptime -p || $Scripts/UptimeNixOS.sh)"
    color = $color4
    font_size = 24
    font_family = JetBrains Mono Nerd Font 10
    position = 0, 0
    halign = right
    valign = bottom
}

# ── Weather ──
label {
    monitor =
    text = cmd[update:3600000] [ -f ~/.cache/.weather_cache ] && echo "ENV.WEATHER: $(cat ~/.cache/.weather_cache)" || echo "ENV.WEATHER: unavailable"
    color = $color4
    font_size = 24
    font_family = JetBrains Mono Nerd Font 10
    position = 50, 0
    halign = left
    valign = bottom
}

# Wallpaper thumbnail — sharp square
image {
    monitor =
    path = $HOME/.config/rofi/.current_wallpaper
    size = 230
    rounding = 0
    border_size = 1
    border_color = rgb(ff0000)
    rotate = 0
    reload_time = -1
    position = 0, 300
    halign = center
    valign = bottom
}
