console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

# ═══════════════════════════════════════════════════════════════════════════════
# SAMARITAN — oh-my-posh theme
# Monochromatic surveillance aesthetic. Red, white, black, grays only.
# ═══════════════════════════════════════════════════════════════════════════════

[palette]
  black = '#111114'
  red = '#ff0000'
  red_muted = '#cc0000'
  red_dark = '#660000'
  white = '#e0e0e0'
  bright_white = '#ffffff'
  gray = '#888888'
  gray_dark = '#555555'
  gray_light = '#aaaaaa'

# ─── SECONDARY PROMPT ─────────────────────────────────────────────────────────
[secondary_prompt]
  template = '<p:red>▸</> '
  foreground = 'p:red'
  background = 'transparent'

# ─── TRANSIENT PROMPT (collapsed after execution) ────────────────────────────
[transient_prompt]
  template = '<p:gray_dark>╶</><p:red>▼</><p:gray_dark>╴</> '
  foreground = 'p:white'
  background = 'transparent'

# ═══════════════════════════════════════════════════════════════════════════════
# LINE 1 — Top bar: identity ◆ path ◆ git ──────────────────── runtime info
# ═══════════════════════════════════════════════════════════════════════════════

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  # ── Opening frame
  [[blocks.segments]]
    style = 'plain'
    template = '<p:gray_dark>┌─</><p:red>▼</><p:gray_dark>─[</>'
    foreground = 'p:gray_dark'
    background = 'transparent'
    type = 'text'

  # ── VPN / TUN0
  [[blocks.segments]]
    style = 'plain'
    template = '{{ if .Env.TUN0 }}<p:red_muted> {{ .Env.TUN0 }}</> <p:gray_dark>◈</> {{ end }}'
    foreground = 'p:gray'
    background = 'transparent'
    type = 'session'

  # ── Username
  [[blocks.segments]]
    style = 'plain'
    template = '{{ if .SSHSession }}<p:red> </> {{ end }}<p:white>{{ .UserName }}</>'
    foreground = 'p:white'
    background = 'transparent'
    type = 'session'

  # ── Separator + Path
  [[blocks.segments]]
    style = 'plain'
    template = ' <p:gray_dark>◈</> <p:gray_light> {{ path .Path .Location }}</>'
    foreground = 'p:gray_light'
    background = 'transparent'
    type = 'path'

    [blocks.segments.properties]
      style = 'folder'

  # ── Separator + Git
  [[blocks.segments]]
    style = 'plain'
    template = ' <p:gray_dark>◈</> {{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} <p:red> {{ .Working.String }}</>{{ end }}{{ if .Staging.Changed }} <p:red_muted> {{ .Staging.String }}</>{{ end }}'
    foreground = 'p:gray'
    background = 'transparent'
    type = 'git'
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:red_muted{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}', '{{ if gt .Ahead 0 }}p:red_muted{{ end }}', '{{ if gt .Behind 0 }}p:red_muted{{ end }}']

    [blocks.segments.properties]
      branch_max_length = 25
      fetch_status = true
      fetch_upstream_icon = true

  # ── Closing bracket
  [[blocks.segments]]
    style = 'plain'
    template = '<p:gray_dark>]</>'
    foreground = 'p:gray_dark'
    background = 'transparent'
    type = 'text'

# ── Right-aligned: runtime info ─────────────────────────────
[[blocks]]
  type = 'prompt'
  alignment = 'right'
  overflow = 'hide'
  filler = '<p:gray_dark>─</>'

  # ── Language icons (subtle)
  [[blocks.segments]]
    style = 'plain'
    template = '<p:gray_dark>[</><p:gray> </>'
    foreground = 'p:gray'
    background = 'transparent'
    type = 'node'

    [blocks.segments.properties]
      display_mode = 'files'
      fetch_package_manager = false
      home_enabled = false

  [[blocks.segments]]
    style = 'plain'
    template = '<p:gray> </>'
    foreground = 'p:gray'
    background = 'transparent'
    type = 'go'

    [blocks.segments.properties]
      fetch_version = false

  [[blocks.segments]]
    style = 'plain'
    template = '<p:gray> </>'
    foreground = 'p:gray'
    background = 'transparent'
    type = 'python'

    [blocks.segments.properties]
      display_mode = 'files'
      fetch_version = false
      fetch_virtual_env = false

  # ── Shell name
  [[blocks.segments]]
    style = 'plain'
    template = '<p:gray_dark>SHELL:</><p:gray>{{ .Name }}</>'
    foreground = 'p:gray'
    background = 'transparent'
    type = 'shell'

  # ── Data feed timestamp
  [[blocks.segments]]
    style = 'plain'
    template = ' <p:gray_dark>◈</> <p:gray_dark>FEED:</><p:gray>{{ .CurrentDate | date "15:04:05" }}</><p:gray_dark>]─┐</>'
    foreground = 'p:gray'
    background = 'transparent'
    type = 'time'

# ═══════════════════════════════════════════════════════════════════════════════
# LINE 2 — Input line: status indicator ▸ cursor
# ═══════════════════════════════════════════════════════════════════════════════

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  # ── Frame connector
  [[blocks.segments]]
    style = 'plain'
    template = '<p:gray_dark>└─</>'
    foreground = 'p:gray_dark'
    background = 'transparent'
    type = 'text'

  # ── Root warning
  [[blocks.segments]]
    style = 'plain'
    template = '<p:red>ROOT</> '
    foreground = 'p:red'
    background = 'transparent'
    type = 'root'

  # ── Status indicator: ▸ red on error, gray on success
  [[blocks.segments]]
    style = 'plain'
    template = '{{ if gt .Code 0 }}<p:red>⟋⟋</> {{ else }}<p:gray_dark>⟋⟋</> {{ end }}'
    foreground = 'p:gray_dark'
    background = 'transparent'
    type = 'status'

    [blocks.segments.properties]
      always_enabled = true

# ═══════════════════════════════════════════════════════════════════════════════
# TOOLTIPS
# ═══════════════════════════════════════════════════════════════════════════════

[[tooltips]]
  style = 'diamond'
  leading_diamond = ''
  trailing_diamond = ''
  template = '  {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
  foreground = 'p:white'
  background = 'p:gray_dark'
  type = 'aws'
  tips = ['aws']

  [tooltips.properties]
    display_default = true

[[tooltips]]
  style = 'diamond'
  leading_diamond = ''
  trailing_diamond = ''
  template = '  {{ .Name }} '
  foreground = 'p:white'
  background = 'p:gray_dark'
  type = 'az'
  tips = ['az']

  [tooltips.properties]
    display_default = true
